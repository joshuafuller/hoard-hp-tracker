name: Deploy to GitHub Pages

# Production (main) is served at the site root; the optional `beta` branch is
# served at /beta/. Pages replaces the whole site on each deploy, so every run
# rebuilds BOTH, regardless of which branch triggered it.
on:
  push:
    branches: [main, beta]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Serialize deploys; do NOT cancel an in-flight one (canceling a running Pages
  # deployment can leave the site half-updated). Overlapping main/beta pushes just
  # queue and run in order — each run rebuilds the whole site, so the latest wins.
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Build production (main) → site root
        run: |
          pnpm install --frozen-lockfile
          HOARD_BASE=/hoard-hp-tracker/ pnpm build
          mkdir -p _site
          cp -r dist/. _site/

      - name: Build beta (if the branch exists) → /beta/
        run: |
          if git ls-remote --exit-code --heads origin beta >/dev/null 2>&1; then
            git fetch origin beta
            git checkout -B beta FETCH_HEAD
            pnpm install --frozen-lockfile
            HOARD_BASE=/hoard-hp-tracker/beta/ pnpm build
            mkdir -p _site/beta
            cp -r dist/. _site/beta/
            echo "Built beta → /beta/"
          else
            echo "No 'beta' branch; deploying production only."
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
