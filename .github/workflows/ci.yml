name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A PR opened from a same-repo branch that targets main triggers both the
# `push` (on the source branch) and `pull_request` events, and rapid pushes
# queue redundant runs. PR runs are grouped per PR number and superseded ones
# are cancelled, so only the latest commit's checks hold a runner. Push runs
# (main) fall back to `github.run_id`, which is unique per run, so each
# push gets its own group and production CI is never cancelled or queued behind
# an earlier push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # lint + typecheck + test + build share one install, so co-locating them in a
  # single job is cheaper than four jobs each paying the install cost. This job
  # runs in parallel with `mutation` (below) and the separate E2E workflow.
  test:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        id: node
        with:
          node-version: 22
          cache: pnpm
      # Cache the installed node_modules tree keyed on the lockfile + the exact
      # resolved Node version (not just the `22` major), so a Node patch bump
      # never restores native/binary deps (e.g. esbuild) built under a different
      # runtime. A cache hit skips the install's link/build step entirely (the
      # pnpm `cache: pnpm` above only restores the global store, not node_modules).
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-node${{ steps.node.outputs.node-version }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      # Type-check the Playwright specs + config (excluded from the root
      # typecheck); no browser needed, so it lives here, not in the e2e job.
      - run: pnpm typecheck:e2e
      - run: pnpm test
      - run: pnpm build

  mutation:
    name: mutation testing (domain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        id: node
        with:
          node-version: 22
          cache: pnpm
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-node${{ steps.node.outputs.node-version }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      # Restore the prior incremental mutation results so unchanged domain code is
      # not re-mutated (Stryker `incremental` — see stryker.config.json). The key is
      # scoped to the lockfile + stryker config: a dependency or config change yields
      # a new prefix, so a stale report is NOT restored (it would let Stryker reuse
      # mutant verdicts that a dep change could invalidate — Codex #200) — that run
      # rebuilds the report from a full pass. `github.run_id` keeps the primary key
      # unique so a fresh file is always saved; the rolling restore-key grabs the
      # most recent prior file with the SAME deps+config (a PR restores its base's).
      # The full score + break threshold are unaffected — only the runtime drops.
      - name: Cache Stryker incremental
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental-${{ hashFiles('pnpm-lock.yaml', 'stryker.config.json') }}-${{ github.run_id }}
          restore-keys: |
            stryker-incremental-${{ hashFiles('pnpm-lock.yaml', 'stryker.config.json') }}-
      # Fails the build if the domain mutation score drops below the configured
      # break threshold (see stryker.config.json).
      - run: pnpm mutation
