name: E2E

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

jobs:
  e2e:
    name: playwright layout guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Install only the Chromium browser + OS-level deps (no Firefox/WebKit).
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
