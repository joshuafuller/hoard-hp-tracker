<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hoard — dice interface mock (table throw)</title>
<style>
  :root{ --bg:#0b0a08; --gold:#e8b45a; --ivory:#f4ecdd; --muted:#9a8f7a; --line:#2a2418; --surface:#16130d; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1000px 600px at 50% -10%, rgba(232,180,90,.08), transparent 60%), var(--bg);
       color:var(--ivory); font-family:system-ui,-apple-system,"Segoe UI",sans-serif; overflow:hidden}

  /* ── faux Hoard app (so you see the throw IN CONTEXT) ── */
  .app{position:fixed; inset:0; z-index:1; display:flex; flex-direction:column; align-items:center;
       transition:filter .25s ease, opacity .25s ease}
  .app[data-dim="1"]{filter:blur(2px) brightness(.5)}
  .chrome{position:absolute; top:14px; right:14px; display:flex; gap:8px; z-index:3}
  .ic{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;cursor:pointer;
      background:var(--surface);border:1px solid color-mix(in oklab,var(--gold) 30%,var(--line));color:var(--gold);
      font-weight:800;font-size:14px}
  .ic.dice{font-size:12px; letter-spacing:.02em}
  .card{margin:auto;width:min(92vw,30rem);background:linear-gradient(180deg,#17140d,#100e0a);
        border:1px solid var(--line);border-radius:28px;padding:26px 18px;display:flex;flex-direction:column;align-items:center;gap:14px;
        box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .name{font-family:Georgia,serif;font-weight:700;font-size:20px}
  .name span{display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-align:center;margin-top:2px}
  .orb{width:200px;height:200px;border-radius:50%;position:relative;
       background:radial-gradient(62% 56% at 38% 30%,#fff1c6,#f4c66a 28%,#d49a3f 62%,#9c6a23 100%);
       box-shadow:inset 0 0 0 2px rgba(255,244,206,.6), inset 0 -9px 16px rgba(40,24,4,.5),
         0 0 0 7px #100e0a, 0 0 0 8px color-mix(in oklab,var(--gold) 60%,transparent), 0 24px 50px rgba(0,0,0,.55)}
  .orb b{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
         font-weight:800;font-size:54px;color:#2a1c06;font-variant-numeric:tabular-nums}
  .orb b span{font-size:13px;color:rgba(42,28,6,.7)}
  .rests{display:flex;gap:10px}
  .rest{padding:10px 18px;border-radius:14px;color:#2a1c06;font-weight:700;font-size:13px;
        background:linear-gradient(180deg,#fbe6ac,#f4c66a 40%,#cf9a3f);border:1px solid rgba(120,80,24,.5)}

  /* ── dice tray (full-screen throw) ── */
  #dice-box{position:fixed; inset:0; z-index:3; pointer-events:none}
  #dice-box canvas{width:100%!important;height:100%!important}
  .scrim{position:fixed;inset:0;z-index:2;background:rgba(6,5,4,.45);opacity:0;pointer-events:none;transition:opacity .25s ease}
  .tray[data-open="1"] .scrim{opacity:1}
  .tray[data-open="1"] #dice-box{pointer-events:auto}
  /* Fully removed from hit-testing when closed (display:none) so it can't eat
     clicks on the app/chrome underneath. */
  .trayui{position:fixed;inset:0;z-index:4;display:none;flex-direction:column}
  .tray[data-open="1"] .trayui{display:flex}
  .trayui .topbar{display:flex;justify-content:space-between;align-items:center;padding:16px;pointer-events:auto}
  .trayui .ttl{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
  .close{pointer-events:auto;width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--line);color:var(--ivory);font-size:18px;cursor:pointer}
  .total{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;pointer-events:none}
  .total b{font-size:80px;font-weight:800;font-variant-numeric:tabular-nums;text-shadow:0 4px 30px rgba(0,0,0,.8)}
  .total .detail{font-size:13px;color:var(--muted);min-height:1.2em}
  .total .hint{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#6a6151}
  .ctrls{pointer-events:auto;padding:12px 12px calc(env(safe-area-inset-bottom,0px) + 16px);display:flex;flex-direction:column;gap:10px;align-items:center}
  .row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:520px}
  .die{appearance:none;cursor:pointer;min-width:52px;padding:11px 13px;border-radius:12px;
       background:linear-gradient(180deg,#fbe6ac,#f4c66a 40%,#cf9a3f);color:#2a1c06;font-weight:800;font-size:14px;
       border:1px solid rgba(120,80,24,.5);box-shadow:inset 0 1px 0 rgba(255,248,222,.6),0 4px 12px rgba(0,0,0,.4)}
  .die.alt{background:var(--surface);color:var(--gold);border-color:var(--line);box-shadow:none}
  .nrow{display:flex;gap:8px}
  .nrow input{width:130px;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--ivory);text-align:center}
  .status{font-size:10px;color:var(--muted);min-height:1.1em}
  .raw{max-width:90vw;margin:10px auto 0;padding:8px 10px;border-radius:8px;background:rgba(0,0,0,.5);border:1px solid var(--line);
    color:#cdbfa3;font:11px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;word-break:break-word;
    max-height:104px;overflow:auto;text-align:left;pointer-events:auto}
  .loglist{max-width:90vw;margin:8px auto 0;display:flex;flex-direction:column;gap:3px;max-height:120px;overflow:auto;pointer-events:auto;text-align:left}
  .rec{font-size:12px;color:var(--ivory)} .rec .n{color:var(--gold);font-weight:700} .rec .d{color:var(--muted);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <!-- faux Hoard app -->
  <div class="app" id="app">
    <div class="chrome">
      <div class="ic" title="Coins">◉</div>
      <div class="ic" title="Sound">♪</div>
      <div class="ic" title="Concentration">◈</div>
      <div class="ic dice" id="openDice" title="Dice">d20</div>
    </div>
    <div class="card">
      <div class="name">Thorin Brassbeard<span>Lv 5 Fighter</span></div>
      <div class="orb"><b>27<span>/ 45</span></b></div>
      <div class="rests"><div class="rest">Short Rest</div><div class="rest">Long Rest</div></div>
    </div>
  </div>

  <!-- dice tray -->
  <div class="tray" id="tray" data-open="0">
    <div class="scrim" id="scrim"></div>
    <div id="dice-box"></div>
    <div class="trayui">
      <div class="topbar"><span class="ttl">Roll</span><button class="close" id="close">✕</button></div>
      <div class="total"><b id="total">—</b><div class="detail" id="detail"></div>
        <pre class="raw" id="raw" title="recorded dice array (last roll)"></pre>
        <div class="loglist" id="log"></div>
        <div class="hint">tap the tray to clear</div>
      </div>
      <div class="ctrls">
        <div class="row" id="dice"></div>
        <div class="row">
          <button class="die alt" data-n="2d20kh1">Advantage</button>
          <button class="die alt" data-n="2d20kl1">Disadvantage</button>
          <button class="die alt" data-n="3d6!">Exploding 3d6!</button>
          <button class="die alt" data-n="4d6kh3">4d6kh3</button>
          <button class="die alt" data-n="1d20+5">1d20+5</button>
        </div>
        <div class="nrow"><input id="notation" placeholder="3d8+2"/><button class="die" id="rollBtn">Roll</button></div>
        <div class="status" id="status">dice load on first open…</div>
      </div>
    </div>
  </div>

<script type="module">
  import DiceBox from "/dist/dice-box.es.js";
  import DiceParser from "/parser.js";
  const $=(id)=>document.getElementById(id);
  const tray=$("tray"), setStatus=(s)=>$("status").textContent=s;
  const DP=new DiceParser(); // full Roll20 notation: kh/kl (adv/dis), !, r, etc.
  let box=null, ready=false, loading=false, pendingNotation="";
  const history=[]; // recorded rolls: {notation,total,result,dice[]}

  // Lazy-init: only build dice-box the first time the tray opens (mirrors the app plan).
  async function ensureBox(){
    if (ready || loading) return;
    loading=true; setStatus("loading dice…");
    box=new DiceBox("#dice-box",{assetPath:"/dist/assets/",theme:"default",themeColor:"#e8b45a",scale:7,gravity:1.4});
    // The parser drives results: exploding/reroll ADD dice mid-roll, so use
    // onRollComplete — resolve rerolls first, then compute the final result.
    box.onRollComplete=(results)=>{
      const rerolls=DP.handleRerolls(results);
      if(rerolls.length){ box.add(rerolls, {newStartPoint:false}); return; }
      const final=DP.parseFinalResults(results);
      const groups=Array.isArray(final)?final:[final];
      const total=groups.reduce((s,g)=>s+(g?.value||0),0);
      // the recorded dice array: every die that landed, with its kept/dropped flag
      const dice=groups.flatMap((g)=>(g.rolls||[]).map((r)=>({sides:g.die?.value??g.sides,value:r.value,dropped:!!(r.drop||r.valid===false)})));
      const result=dice.filter((d)=>!d.dropped).map((d)=>d.value); // the result for the roll (kept dice)
      $("total").textContent=String(total);
      $("detail").textContent=detailOf(groups);
      const rec={notation:pendingNotation,total,result,dice};
      history.unshift(rec); if(history.length>20) history.pop();
      window.__history=history; // the recorded array, inspectable
      $("raw").textContent="result: ["+result.join(", ")+"]   total: "+total+"\narray: "+JSON.stringify(dice);
      $("log").innerHTML=history.map((r)=>`<div class="rec"><span class="n">${r.notation}</span> = ${r.total} <span class="d">[${r.dice.map((d)=>d.dropped?`(${d.value})`:d.value).join(", ")}]</span></div>`).join("");
    };
    try{ await box.init(); ready=true; setStatus("ready"); }
    catch(e){ setStatus("init error: "+(e?.message||e)); }
  }
  const detailOf=(groups)=>{
    try{
      return groups.map((g)=>{
        const sides=g.die?.value ?? g.sides ?? "?";
        const rolls=(g.rolls||[]).map((r)=> (r.drop||r.valid===false) ? `(${r.value})` : String(r.value));
        const qty=g.count?.value ?? rolls.length;
        return `${qty}d${sides} → [${rolls.join(", ")}]`;
      }).join("   ");
    }catch{ return ""; }
  };
  const roll=(n)=>{
    if(!ready) return;
    pendingNotation=n;
    $("total").textContent="…"; $("detail").textContent="";
    try{ box.roll(DP.parseNotation(n)); }
    catch(e){ setStatus("bad notation '"+n+"': "+(e?.message||e)); }
  };

  async function openTray(){ tray.dataset.open="1"; $("app").dataset.dim="1"; await ensureBox(); }
  function closeTray(){ tray.dataset.open="0"; $("app").dataset.dim="0"; if(ready) box.clear(); $("total").textContent="—"; $("detail").textContent=""; }

  $("openDice").addEventListener("click", openTray);
  $("close").addEventListener("click", closeTray);
  $("dice-box").addEventListener("click", ()=>{ if(ready){ box.clear(); $("total").textContent="—"; $("detail").textContent=""; }});

  const DICE=["1d4","1d6","1d8","1d10","1d12","1d20","1d100"];
  for(const d of DICE){ const b=document.createElement("button"); b.className="die"; b.textContent="d"+d.split("d")[1]; b.dataset.n=d; $("dice").appendChild(b); }
  document.querySelectorAll("button[data-n]").forEach(b=>b.addEventListener("click",()=>roll(b.dataset.n)));
  $("rollBtn").addEventListener("click",()=>{const v=$("notation").value.trim();if(v)roll(v);});
  $("notation").addEventListener("keydown",e=>{if(e.key==="Enter"){const v=e.target.value.trim();if(v)roll(v);}});
</script>
</body></html>
